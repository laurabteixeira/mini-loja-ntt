services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-loja-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mini_loja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mini_loja}
      POSTGRES_DB: ${POSTGRES_DB:-mini_loja}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini_loja} -d ${POSTGRES_DB:-mini_loja}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: mini-loja-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mini-loja-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-mini_loja}:${POSTGRES_PASSWORD:-mini_loja}@postgres:5432/${POSTGRES_DB:-mini_loja}
      REDIS_URL: redis://redis:6379
      CACHE_TTL: ${CACHE_TTL:-60}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mini-loja-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - backend

volumes:
  postgres_data:
